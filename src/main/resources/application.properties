# =============================================================================
# Hackhub Application Configuration
# =============================================================================
spring.application.name=Hackhub

# =============================================================================
# VALIDATION MESSAGES CONFIGURATION
# =============================================================================
# Indica a Spring dove trovare i messaggi di validazione personalizzati
# Puoi specificare pi¨ file separati da virgola (es. ValidationMessages,messages)
spring.messages.basename=ValidationMessages
spring.messages.encoding=UTF-8

# =============================================================================
# H2 DATABASE CONFIGURATION
# =============================================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.datasource.url=jdbc:h2:file:./src/main/resources/database/hackhubdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =============================================================================
# JPA SETTINGS
# =============================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect